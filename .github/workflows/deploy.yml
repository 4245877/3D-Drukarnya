name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  # SKUFNYA promo prices and the Offer priceValidUntil date are baked in at
  # build time, so rebuild weekly to keep them from drifting out of date.
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

# Default for every job. The deploy job overrides this with the narrow set
# of permissions it actually needs; no job gets more than that.
permissions:
  contents: read

# A newer run supersedes any older in-flight one: cancel the stale deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # No later step needs the git token; do not leave it in .git/config.
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          # Must satisfy the "engines" range in package.json (Astro 7 needs
          # Node >= 22.12).
          node-version: 22
          cache: npm

      - name: Install dependencies (clean install from lockfile)
        run: npm ci

      # All dependencies are dev/build-time only (the site itself is static),
      # so fail the deploy only on high/critical advisories in the toolchain.
      - name: Audit dependencies for known vulnerabilities
        run: npm audit --audit-level=high

      - name: Validate product data
        run: npm run validate:data

      - name: Check types and Astro diagnostics
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build

      # Post-build artifact checks: metadata uniqueness, JSON-LD validity and
      # consistency with the visible pages, internal links/anchors, branding
      # assets, image fallback wiring, dangerous URL schemes.
      - name: Check build artifact
        run: npm run check:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # The only job that needs deployment permissions.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
