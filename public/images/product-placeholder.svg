<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-label="Фото тимчасово недоступне">
  <!-- Branded fallback shown when a product photo fails to load.
       Palette and motifs mirror base.css: cream, copper, burgundy,
       the sparkle pattern from the page background and the "3D"
       logo mark from the site header. -->
  <defs>
    <linearGradient id="ph-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5EDE0"/>
      <stop offset="0.55" stop-color="#EFE3CE"/>
      <stop offset="1" stop-color="#E8D8BE"/>
    </linearGradient>
    <linearGradient id="ph-mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8E3F43"/>
      <stop offset="1" stop-color="#AC4151"/>
    </linearGradient>
    <radialGradient id="ph-glow" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#D99A74" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D99A74" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="640" fill="url(#ph-bg)"/>
  <rect width="640" height="640" fill="url(#ph-glow)"/>

  <!-- Sparkles: same diamond motif as the body background pattern -->
  <g fill="#C88463" fill-opacity="0.18">
    <path d="M110 128 l7 18 18 7 -18 7 -7 18 -7 -18 -18 -7 18 -7 z"/>
    <path d="M540 96 l5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 13 -5 z"/>
    <path d="M560 470 l6 15 15 6 -15 6 -6 15 -6 -15 -15 -6 15 -6 z"/>
    <path d="M92 520 l5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 13 -5 z"/>
  </g>
  <g fill="#B89A61" fill-opacity="0.35">
    <circle cx="180" cy="84" r="3"/>
    <circle cx="470" cy="150" r="2.4"/>
    <circle cx="120" cy="420" r="2.4"/>
    <circle cx="510" cy="560" r="3"/>
  </g>

  <!-- "3D" logo mark, as in the site header -->
  <rect x="252" y="216" width="136" height="112" rx="18" fill="url(#ph-mark)"/>
  <rect x="252" y="216" width="136" height="112" rx="18" fill="none" stroke="#5A3A2E" stroke-opacity="0.14" stroke-width="2"/>
  <text x="320" y="296" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="64" letter-spacing="-1" fill="#E8D8BE">3D</text>

  <text x="320" y="392" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="40" fill="#5A3A2E">Друкарня</text>

  <g>
    <line x1="216" y1="428" x2="424" y2="428" stroke="#B89A61" stroke-opacity="0.5" stroke-width="1.5"/>
    <path d="M320 420 l4 8 -4 8 -4 -8 z" fill="#B89A61" fill-opacity="0.7"/>
  </g>

  <text x="320" y="474" text-anchor="middle" font-family="system-ui, 'Segoe UI', sans-serif" font-size="22" fill="#725848">Фото тимчасово недоступне</text>
</svg>
